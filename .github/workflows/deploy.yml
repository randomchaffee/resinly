name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 (DO actually)
        uses: appleboy/ssh-action@v1.2.0
        env:
          EC2_BOT_REPO_DIR: ${{ secrets.EC2_BOT_REPO_DIR }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          envs: EC2_BOT_REPO_DIR
          script: |
            set -e
            BOT_DIR="${EC2_BOT_REPO_DIR:-/home/ubuntu/resinly}"
            echo "Using bot directory: ${BOT_DIR}"
            cd "${BOT_DIR}"

            git fetch origin main
            git pull origin main

            if [ ! -f .env ]; then
              echo ".env is missing in ${BOT_DIR}. Create it manually on EC2 before deploy."
              exit 1
            fi

            docker compose up -d --build

            sleep 10

            docker compose ps
            docker compose logs --tail=100 bot

            if ! docker compose ps --status running | grep -q resinly-bot; then
              echo "Bot container is not running after deploy."
              exit 1
            fi